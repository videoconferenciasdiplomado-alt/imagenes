<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESPECIALÍZATE EN INTELIGENCIA ARTIFICIAL DE 0 A 100 - CRONOGRAMA ACADÉMICO</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

      :root {
        --azul-principal: #024adf;
        --gris-fondo: #f0f0f0;
        --texto-oscuro: #1d1d1b;
        --blanco: #fff;
        --padding-primario: 50px;
        --padding-secundario: 30px;
        --gap-primario: 25px;
        --gap-secundario: 15px;
        --borde: 2px solid var(--texto-oscuro);
        --radio: 20px;
        --fuente-0: 101px;
        --fuente-b: 46px;
      }

      body {
        font-family: Barlow, sans-serif;
        margin: 0;
        padding: 30px;
        justify-content: start;
        background-color: gray;
        box-sizing: border-box;
        display: flex;
        flex-direction: column-reverse;
        gap: 30px;
      }

      .cronograma-academico {
        width: 1600px;
        height: 400px;
        justify-content: space-between;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
        padding: var(--padding-primario);
        background-color: var(--gris-fondo);
        color: var(--texto-oscuro);
      }

      .correo-academico {
        background-color: transparent;
        padding: var(--padding-secundario);
        border-bottom-width: 6px;
        background-image: linear-gradient(var(--gris-fondo) 1px, transparent 1px), linear-gradient(90deg, var(--gris-fondo) 1px, transparent 1px);
        background-size: 28px 28px;
        background-position: -1px -1px;
        width: 585px;
        height: 1200px;
      }

      .correo-academico-2 {
        width: fit-content;
        justify-content: space-between;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
        background-color: var(--gris-fondo);
        color: var(--texto-oscuro);
      }

      .correo-academico-3 {
        width: fit-content;
        justify-content: space-between;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
        background-color: var(--gris-fondo);
        color: var(--texto-oscuro);
      }

      .fila-etiquetas {
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: var(--gap-secundario);
      }

      .logo-cabecera {
        margin-left: auto;
        height: 85px;
        width: auto;
        display: block;
        align-self: center;
      }

      .logo-correo {
        margin-left: auto;
        height: auto;
        width: 110px;
        display: block;
        align-self: center;
      }

      .titulo-principal {
        font-size: var(--fuente-0);
        font-family: "Barlow Condensed", sans-serif;
        font-style: italic;
        text-transform: uppercase;
        font-weight: 900;
        line-height: 0.95;
        margin: 0;
        text-wrap: balance;
      }

      .titulo-correo {
        font-size: 45px;
        font-family: "Barlow Condensed", sans-serif;
        font-style: italic;
        text-transform: uppercase;
        font-weight: 900;
        line-height: 0.95;
        margin: 0;
        text-wrap: balance;
      }

      .etiqueta-malla {
        background-color: var(--azul-principal);
        color: var(--blanco);
        font-weight: 800;
        padding: 12px 18px;
        display: inline-block;
        width: fit-content;
        text-transform: uppercase;
        line-height: 1.1;
        margin-bottom: calc(var(--gap-secundario) - 5px);
        text-align: left;
        font-size: var(--fuente-b);
        font-style: italic;
        border: var(--borde);
        border-color: var(--azul-principal);
      }

      .etiqueta-correo {
        background-color: var(--azul-principal);
        color: var(--blanco);
        font-weight: 800;
        padding: 6px 9px;
        display: inline-block;
        text-transform: uppercase;
        line-height: 1.1;
        margin-bottom: calc(var(--gap-secundario) - 5px);
        text-align: left;
        font-size: 25px;
        font-style: italic;
        border: var(--borde);
        border-color: var(--azul-principal);
      }

      .correo-academico-3 .etiqueta-correo {
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div class="cronograma-academico">
      <div class="fila-etiquetas">
        <div class="etiqueta-malla">fICHA académicA</div>

        <img class="logo-cabecera" src="https://raw.githubusercontent.com/videoconferenciasdiplomado-alt/imagenes/main/logo/logo%20negro.png" alt="Logo" />
      </div>

      <div class="titulo-principal">Especialízate en Inteligencia Artificial de 0 a 100</div>
    </div>

    <div class="correo-academico"></div>
    <div class="correo-academico-2">
      <div class="titulo-correo">
        Especialízate en Inteligencia <br />
        Artificial de 0 a 100
      </div>
    </div>

    <div class="correo-academico-3">
      <div class="etiqueta-correo">curso</div>
    </div>

    <div id="recordatorio" class="correo-academico-3">
      <div class="etiqueta-correo">recordatorio</div>
    </div>
    <div id="felicidades" class="correo-academico-3">
      <div class="etiqueta-correo">¡Felicidades!</div>
    </div>

    <div class="correo-academico-3">
      <div class="etiqueta-correo">
        DIPLOMADO de alta<br />
        especialización en
      </div>
    </div>
  </body>
</html>
